<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Hub | HTML5 Mini Games</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="blob-bg"></div>

    <header>
      <nav>
        <div class="logo">ARCADE<span>HUB</span></div>
        <div class="tagline">Premium HTML5 Gaming</div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>
          Level Up Your
          <span class="gradient-text">Micro-Gaming</span> Experience
        </h1>
        <p>
          A curated collection of lightning-fast, high-quality HTML5 mini-games.
        </p>
      </section>

      <section class="game-grid" id="gameGrid">
        <!-- Game cards will be injected or added here -->
        <div class="game-card placeholder">
          <div class="card-inner">
            <div class="status">Coming Soon</div>
            <h3>Expanding the Universe</h3>
            <p>New games are being developed. Stay tuned!</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>
        &copy; 2026 Arcade Hub. Built with &hearts; for high-performance gaming.
      </p>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
