<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Hub | HTML5 Mini Games</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="transition-overlay" id="transitionOverlay"></div>
    <div class="blob-bg"></div>

    <header>
      <nav>
        <div class="logo">ARCADE<span>HUB</span></div>
        <div class="header-right">
          <button class="header-icon-btn" id="profileBtn" aria-label="Player profile">👤</button>
          <button class="header-icon-btn" id="achievementsBtn" aria-label="Achievements">🏅</button>
          <button class="header-icon-btn" id="settingsBtn" aria-label="Settings">⚙️</button>
          <div class="lang-picker-wrap" id="langPickerWrap">
            <button class="header-icon-btn" id="langBtn" aria-label="Language">🌐</button>
          </div>
          <button class="sound-toggle" id="soundToggle" aria-label="Toggle sound"></button>
          <div class="arcade-coins">🪙 <span id="global-coins">0</span></div>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>
          <span data-i18n="heroTitle1">Level Up Your</span>
          <span class="gradient-text" data-i18n="heroTitle2">Micro-Gaming</span>
          <span data-i18n="heroTitle3">Experience</span>
        </h1>
        <p data-i18n="heroTagline">
          A curated collection of lightning-fast, high-quality HTML5 mini-games.
        </p>
      </section>

      <section class="stats-strip" id="statsStrip"></section>

      <section class="filter-bar" id="filterBar"></section>

      <section class="achievements-panel" id="achievementsPanel" style="display:none"></section>

      <section id="gameGrid"></section>
    </main>

    <footer>
      <p data-i18n="footerText">
        &copy; 2026 Arcade Hub. Built with &hearts; for high-performance gaming.
      </p>
    </footer>

    <script type="module" src="main.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
