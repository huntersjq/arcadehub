<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Speller | Arcade Hub</title>
    <link rel="stylesheet" href="../shared/hub-nav.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --accent: #8b5cf6;
        --accent-dim: #6d28d9;
        --bg: #0a0a14;
        --surface: #141420;
        --surface-light: #1e1e30;
        --text: #e8e8f0;
        --text-dim: #8888a0;
        --success: #22c55e;
        --danger: #ef4444;
        --warning: #f59e0b;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Outfit', system-ui, sans-serif;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Starfield background */
      .stars {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4), transparent),
          radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.3), transparent),
          radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.2), transparent),
          radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.4), transparent),
          radial-gradient(1px 1px at 10% 90%, rgba(255,255,255,0.3), transparent),
          radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.2), transparent);
        background-size: 250px 250px;
        animation: twinkle 8s ease-in-out infinite alternate;
      }
      @keyframes twinkle { 0% { opacity: 0.5; } 100% { opacity: 1; } }

      .game-container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        padding: 2rem;
        max-width: 600px;
        width: 100%;
      }

      /* HUD */
      .hud {
        display: flex;
        justify-content: space-between;
        width: 100%;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9rem;
      }
      .hud-item { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
      .hud-label { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
      .hud-value { font-weight: 700; font-size: 1.2rem; }
      .hud-value.score { color: var(--accent); }
      .hud-value.streak { color: var(--warning); }

      /* Timer bar */
      .timer-track {
        width: 100%;
        height: 6px;
        background: var(--surface);
        border-radius: 3px;
        overflow: hidden;
      }
      .timer-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--danger), var(--warning), var(--success));
        border-radius: 3px;
        transition: width 0.1s linear;
      }

      /* Word display */
      .scrambled-word {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 800;
        letter-spacing: 0.15em;
        color: var(--accent);
        text-shadow: 0 0 30px rgba(139,92,246,0.3);
        min-height: 4rem;
        display: flex;
        align-items: center;
      }

      /* Letter tiles */
      .letter-tiles {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        min-height: 3.5rem;
      }
      .tile {
        width: 3rem;
        height: 3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        font-weight: 700;
        background: var(--surface-light);
        border: 2px solid transparent;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.15s, border-color 0.15s, opacity 0.15s;
        user-select: none;
      }
      .tile:hover { border-color: var(--accent); transform: translateY(-2px); }
      .tile.used { opacity: 0.3; pointer-events: none; }

      /* Answer area */
      .answer-area {
        display: flex;
        gap: 0.4rem;
        justify-content: center;
        min-height: 3.5rem;
        flex-wrap: wrap;
      }
      .answer-slot {
        width: 3rem;
        height: 3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        font-weight: 700;
        border-bottom: 3px solid var(--surface-light);
        transition: border-color 0.15s;
      }
      .answer-slot.filled { border-color: var(--accent); color: var(--accent); }
      .answer-slot.correct { border-color: var(--success); color: var(--success); }
      .answer-slot.wrong { border-color: var(--danger); color: var(--danger); }

      /* Controls */
      .controls {
        display: flex;
        gap: 0.75rem;
      }
      .btn {
        padding: 0.6rem 1.5rem;
        font-size: 0.9rem;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        border: 2px solid var(--surface-light);
        background: var(--surface);
        color: var(--text);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .btn:hover { background: var(--surface-light); border-color: var(--accent); }

      /* Feedback flash */
      .feedback {
        font-size: 1.2rem;
        font-weight: 700;
        min-height: 2rem;
        transition: opacity 0.3s;
      }
      .feedback.correct { color: var(--success); }
      .feedback.wrong { color: var(--danger); }

      /* Overlay screens */
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(10,10,20,0.92);
        z-index: 20;
        gap: 1.2rem;
      }
      .overlay h2 {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .overlay p { color: var(--text-dim); font-size: 1.1rem; max-width: 360px; text-align: center; }
      .overlay .stat { font-family: 'JetBrains Mono', monospace; color: var(--text); font-size: 1.3rem; }
      .play-btn {
        padding: 0.8rem 2.5rem;
        font-size: 1.1rem;
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dim));
        color: #fff;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(139,92,246,0.4); }

      @media (max-width: 480px) {
        .tile, .answer-slot { width: 2.5rem; height: 2.5rem; font-size: 1.1rem; }
        .hud { font-size: 0.8rem; }
      }
    </style>
  </head>
  <body>
    <div class="stars"></div>

    <div class="game-container" id="gameUI" style="display:none">
      <div class="hud">
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <span class="hud-value score" id="score">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Level</span>
          <span class="hud-value" id="level">1</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Streak</span>
          <span class="hud-value streak" id="streak">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Lives</span>
          <span class="hud-value" id="lives">3</span>
        </div>
      </div>

      <div class="timer-track">
        <div class="timer-fill" id="timerFill" style="width:100%"></div>
      </div>

      <div class="scrambled-word" id="scrambled"></div>

      <div class="answer-area" id="answerArea"></div>

      <div class="letter-tiles" id="tiles"></div>

      <div class="feedback" id="feedback">&nbsp;</div>

      <div class="controls">
        <button class="btn" id="clearBtn">Clear</button>
        <button class="btn" id="skipBtn">Skip</button>
      </div>
    </div>

    <div class="overlay" id="startScreen">
      <h2>Stellar Speller</h2>
      <p>Unscramble the word before time runs out. Build streaks for bonus points!</p>
      <button class="play-btn" id="playBtn">PLAY</button>
    </div>

    <div class="overlay" id="gameOverScreen" style="display:none">
      <h2>Game Over</h2>
      <p class="stat">Score: <b id="finalScore">0</b></p>
      <p class="stat">Words Solved: <b id="wordsSolved">0</b></p>
      <p class="stat">Best Streak: <b id="bestStreak">0</b></p>
      <button class="play-btn" id="retryBtn">PLAY AGAIN</button>
    </div>

    <script src="../shared/hub-integration.js"></script>
    <script src="../shared/hub-nav.js"></script>
    <script src="main.js"></script>
  </body>
</html>
