<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Survivor | Arcade Hub</title>
    <script>
      let path = window.location.pathname;
      if (path.endsWith("index.html")) {
        window.history.replaceState(null, "", path.replace("index.html", ""));
      } else if (path.endsWith("bullet-heaven")) {
        window.location.replace(path + "/");
      }
    </script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #050505;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        padding: 24px;
        box-sizing: border-box;
        color: #00f2ff;
        font-family: "Outfit", sans-serif;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        z-index: 800;
      }
      .stat-cluster {
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: rgba(0, 0, 0, 0.4);
        padding: 12px 20px;
        border-radius: 16px;
        border: 1px solid rgba(0, 242, 255, 0.2);
        backdrop-filter: blur(10px);
      }
      .stat-item {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 40px;
        min-width: 200px;
      }
      .stat-label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.6;
        color: #fff;
      }
      .stat-value {
        font-size: 1.8rem;
        font-weight: 800;
        text-align: right;
        text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        flex-grow: 1;
      }
      .top-right-cluster {
        display: flex;
        align-items: center;
        gap: 20px;
        pointer-events: all;
      }
      #timer {
        font-family: "JetBrains Mono", monospace;
        font-size: 1.5rem;
        background: rgba(0, 242, 255, 0.1);
        padding: 8px 16px;
        border-radius: 12px;
        border: 1px solid rgba(0, 242, 255, 0.3);
      }
      .xp-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 4px;
        background: #00ffcc;
        width: 0%;
        transition: width 0.3s;
        box-shadow: 0 0 10px #00ffcc;
      }
      #upgradeOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(5, 5, 12, 0.9);
        backdrop-filter: blur(15px);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        font-family: "Outfit", sans-serif;
        pointer-events: all;
      }
      .upgrade-container {
        text-align: center;
        width: 90%;
        max-width: 900px;
      }
      .upgrade-container h2 {
        color: #00f2ff;
        font-size: 3rem;
        margin-bottom: 3rem;
        text-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
        font-weight: 800;
      }
      #upgradeChoices {
        display: flex;
        gap: 2rem;
        justify-content: center;
      }
      .upgrade-card {
        flex: 1;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(0, 242, 255, 0.2);
        border-radius: 24px;
        padding: 2.5rem;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .upgrade-card:hover {
        background: rgba(0, 242, 255, 0.08);
        border-color: #00f2ff;
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }
      .upgrade-card h3 {
        color: #fff;
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
      .upgrade-card p {
        color: #94a3b8;
        font-size: 1rem;
        line-height: 1.6;
      }
      #mainMenu,
      #pauseMenu {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(5, 5, 12, 0.95);
        backdrop-filter: blur(20px);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Outfit", sans-serif;
        color: #fff;
      }
      .menu-title {
        font-size: 4rem;
        font-weight: 800;
        color: #00f2ff;
        text-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
        margin-bottom: 3rem;
      }
      .menu-btn {
        background: rgba(0, 242, 255, 0.1);
        border: 1px solid #00f2ff;
        color: #00f2ff;
        padding: 1rem 3rem;
        border-radius: 50px;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.3s;
        min-width: 200px;
        margin: 0.5rem;
      }
      .menu-btn:hover {
        background: #00f2ff;
        color: #000;
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
      }
      #bossAlert {
        position: fixed;
        top: 20%;
        left: 0;
        width: 100%;
        text-align: center;
        color: #ff00e5;
        font-size: 3rem;
        font-weight: 800;
        text-shadow: 0 0 20px #ff00e5;
        z-index: 500;
        display: none;
        pointer-events: none;
        animation: pulse 1s infinite;
      }
      #menuToggle {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        padding: 10px 20px;
        border-radius: 12px;
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        font-weight: 600;
        letter-spacing: 1px;
        transition: all 0.3s;
        backdrop-filter: blur(10px);
      }
      #menuToggle:hover {
        background: #fff;
        color: #000;
        border-color: #fff;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      }
      .controls-toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid #00f2ff;
        color: #fff;
        padding: 1rem 2rem;
        border-radius: 12px;
        font-family: "Outfit", sans-serif;
        z-index: 500;
        text-align: center;
        pointer-events: none;
        animation: fadeOut 5s forwards;
      }
      @keyframes fadeOut {
        0%,
        80% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.5;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .achievement-toast {
        position: fixed;
        bottom: 15%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 5, 15, 0.95);
        border: 2px solid #00f2ff;
        padding: 16px 32px;
        border-radius: 4px;
        color: #00f2ff;
        font-family: "JetBrains Mono", monospace;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        display: none;
        z-index: 3000;
        animation: toastIn 0.8s forwards;
      }
      @keyframes toastIn {
        from {
          transform: translate(-50%, 50px);
          opacity: 0;
        }
        to {
          transform: translate(-50%, 0);
          opacity: 1;
        }
      }
      .global-stats {
        margin-bottom: 2.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        font-family: "JetBrains Mono", monospace;
        color: #94a3b8;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        background: rgba(255, 255, 255, 0.03);
        padding: 20px 40px;
        border-radius: 12px;
        border: 1px solid rgba(0, 242, 255, 0.1);
      }
      .global-stats b {
        color: #00f2ff;
        font-weight: 800;
        margin-left: 10px;
      }
      .achievement-grid {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 10px;
      }
      .ach-icon {
        width: 24px;
        height: 24px;
        border: 1px solid rgba(0, 242, 255, 0.2);
        border-radius: 4px;
        background: rgba(0, 242, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        opacity: 0.3;
      }
      .ach-icon.unlocked {
        opacity: 1;
        background: rgba(0, 242, 255, 0.2);
        border-color: #00f2ff;
        box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
      }
    </style>
    <link rel="stylesheet" href="../shared/hub-nav.css" />
  </head>
  <body>
    <div id="bossAlert">BOSS DETECTED</div>
    <div id="achievementNotify" class="achievement-toast"></div>
    <div id="controlsToast" class="controls-toast" style="display: none">
      WASD/ARROWS TO MOVE • TOUCH/CLICK TO TARGET & MOVE
    </div>

    <div id="mainMenu">
      <h1 class="menu-title">NEON SURVIVOR</h1>
      <div class="global-stats" id="globalStats">
        <div>RECORDS DETECTED...</div>
      </div>
      <button class="menu-btn" onclick="game.startGame()">
        START EVOLUTION
      </button>
      <button class="menu-btn" onclick="window.location.href = '../../'">
        BACK TO HUB
      </button>
    </div>

    <div id="pauseMenu" style="display: none">
      <h2 class="menu-title" style="font-size: 3rem">SYSTEM PAUSED</h2>
      <button class="menu-btn" onclick="game.resumeGame()">RESUME</button>
      <button class="menu-btn" onclick="game.startGame()">
        RESTART SESSION
      </button>
      <button class="menu-btn" onclick="game.quitToMenu()">QUIT TO MENU</button>
    </div>

    <div id="ui" style="display: none">
      <div class="stat-cluster">
        <div class="stat-item">
          <span class="stat-label">System Level</span>
          <span id="lvlValue" class="stat-value">01</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Neutralized</span>
          <span id="killValue" class="stat-value">000</span>
        </div>
      </div>

      <div class="top-right-cluster">
        <div id="timer">00:00</div>
        <button id="menuToggle" onclick="game.togglePause()">MENU</button>
      </div>
    </div>
    <div class="xp-bar" id="xpBar" style="display: none"></div>

    <div id="upgradeOverlay">
      <div class="upgrade-container">
        <h2>SOLAR EVOLUTION</h2>
        <div id="upgradeChoices">
          <!-- Choices injected via JS -->
        </div>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script type="module" src="./main.js"></script>
    <script src="../shared/hub-nav.js"></script>
  </body>
</html>
