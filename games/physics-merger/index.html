<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic Merge | Arcade Hub</title>
    <script>
      if (window.location.pathname.endsWith("physics-merger")) {
        window.location.replace(window.location.pathname + "/");
      }
    </script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0a12;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        font-family: "Outfit", sans-serif;
        pointer-events: none;
      }
      .score-label {
        font-size: 14px;
        opacity: 0.7;
      }
      .score-value {
        font-size: 32px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div class="score-label">SCORE</div>
      <div class="score-value" id="score">0</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script type="module" src="./main.js"></script>
  </body>
</html>
