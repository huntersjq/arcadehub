<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cosmic Merge | Arcade Hub</title>
    <script>
      if (window.location.pathname.endsWith("physics-merger")) {
        window.location.replace(window.location.pathname + "/");
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --neon-cyan: #00f2ff;
        --neon-purple: #bc13fe;
        --bg-dark: #05050a;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: var(--bg-dark);
        font-family: "Outfit", sans-serif;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 30px;
        left: 40px;
        color: white;
        pointer-events: none;
        z-index: 100;
      }
      .score-container {
        background: rgba(255, 255, 255, 0.03);
        padding: 15px 30px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
      }
      .score-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 3px;
        color: var(--neon-cyan);
        opacity: 0.8;
      }
      .score-value {
        font-size: 3rem;
        font-weight: 800;
        text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
      }
      #nextPreview {
        position: absolute;
        top: 30px;
        right: 40px;
        text-align: right;
      }
      .preview-box {
        background: rgba(255, 255, 255, 0.03);
        padding: 15px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
      }
      .preview-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 2px;
        color: var(--neon-purple);
      }
      #gameContainer {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      .line {
        position: absolute;
        top: 15%;
        left: 50%;
        transform: translateX(-50%);
        width: 400px;
        height: 1px;
        background: rgba(255, 0, 0, 0.2);
        box-shadow: 0 0 10px rgba(255, 0, 0, 0.1);
        z-index: 5;
      }
      #gameOver {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(5, 5, 10, 0.8);
        backdrop-filter: blur(20px);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        color: white;
      }
      .game-over-title {
        font-size: 4rem;
        font-weight: 800;
        color: var(--neon-cyan);
        margin-bottom: 0.5rem;
        text-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
      }
      .final-score {
        font-size: 1.5rem;
        color: #94a3b8;
        margin-bottom: 2rem;
      }
      .menu-btn {
        background: transparent;
        border: 1px solid var(--neon-cyan);
        color: var(--neon-cyan);
        padding: 15px 40px;
        border-radius: 4px;
        font-family: "JetBrains Mono", monospace;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .menu-btn:hover {
        background: var(--neon-cyan);
        color: var(--bg-dark);
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
      }
      .controls-toast {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.05);
        color: #94a3b8;
        padding: 20px 40px;
        border-radius: 12px;
        font-size: 1rem;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 2px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 50;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      .exit-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(244, 63, 94, 0.3);
        color: #f43f5e;
        padding: 5px 15px;
        border-radius: 4px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.6rem;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.3s;
        margin-bottom: 10px;
        pointer-events: auto;
        backdrop-filter: blur(5px);
      }
      .exit-btn:hover {
        background: rgba(244, 63, 94, 0.1);
        border-color: #f43f5e;
        box-shadow: 0 0 15px rgba(244, 63, 94, 0.2);
      }
      #powerupContainer {
        position: absolute;
        bottom: 30px;
        left: 40px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .powerup-btn {
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid var(--neon-purple);
        color: var(--neon-purple);
        padding: 12px 24px;
        border-radius: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.3s;
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
        text-align: left;
        min-width: 180px;
      }
      .powerup-btn:disabled {
        border-color: #333;
        color: #333;
        cursor: not-allowed;
      }
      .powerup-btn .charge-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        background: var(--neon-purple);
        width: 0%;
        transition: width 0.1s linear;
      }
      .powerup-btn:not(:disabled):hover {
        background: var(--neon-purple);
        color: white;
        box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
      }

      /* Modals */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(15px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
      }
      .modal-content {
        background: #0f172a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 20px;
        width: 90%;
        max-width: 500px;
        color: white;
      }
      .modal-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 20px;
        color: var(--neon-cyan);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .close-btn {
        font-size: 1.5rem;
        cursor: pointer;
        opacity: 0.5;
      }
      .close-btn:hover {
        opacity: 1;
      }

      /* Shop Items */
      .shop-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid transparent;
        transition: border-color 0.2s;
      }
      .shop-item:hover {
        border-color: rgba(0, 242, 255, 0.3);
      }
      .item-info {
        flex: 1;
      }
      .item-name {
        font-weight: 600;
        font-size: 0.9rem;
      }
      .item-desc {
        font-size: 0.75rem;
        color: #94a3b8;
        margin-top: 4px;
      }
      .buy-btn {
        background: var(--neon-cyan);
        color: var(--bg-dark);
        border: none;
        padding: 8px 15px;
        border-radius: 6px;
        font-family: inherit;
        font-weight: 700;
        font-size: 0.8rem;
        cursor: pointer;
      }
      .buy-btn:disabled {
        background: #334155;
        color: #94a3b8;
        cursor: not-allowed;
      }

      /* Leaderboard */
      .leaderboard-list {
        margin-top: 20px;
      }
      .leaderboard-entry {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .rank {
        color: var(--neon-cyan);
        font-weight: bold;
        width: 30px;
      }
      .score {
        font-family: "JetBrains Mono";
      }

      /* Difficulty UI */
      .status-container {
        margin-top: 15px;
        background: rgba(255, 255, 255, 0.03);
        padding: 10px 20px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        width: fit-content;
      }
      .status-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.6rem;
        letter-spacing: 2px;
        color: #94a3b8;
        margin-bottom: 5px;
      }
      .meter-bg {
        width: 150px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .meter-fill {
        height: 100%;
        width: 0%;
        background: var(--neon-cyan);
        transition: width 0.3s ease;
      }
      #stabilityFill {
        background: #10b981;
      }
      #supernovaFill {
        background: #f43f5e;
        box-shadow: 0 0 10px rgba(244, 63, 94, 0.5);
      }

      .warning-toast {
        position: fixed;
        top: 20%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #f43f5e;
        font-family: "JetBrains Mono", monospace;
        font-weight: 800;
        letter-spacing: 4px;
        font-size: 1.5rem;
        text-shadow: 0 0 20px rgba(244, 63, 94, 0.8);
        z-index: 500;
        display: none;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <div id="ui">
        <button
          class="exit-btn"
          onclick="window.location.href = '../../index.html'"
        >
          &lt; EXIT TO HUB
        </button>
        <div class="score-container">
          <div class="score-label">COSMIC REVENUE</div>
          <div class="score-value" id="score">0</div>
        </div>

        <div class="status-container">
          <div class="status-label">SYSTEM STABILITY</div>
          <div class="meter-bg">
            <div
              id="stabilityFill"
              class="meter-fill"
              style="width: 100%"
            ></div>
          </div>
        </div>

        <div class="status-container">
          <div class="status-label">SUPERNOVA CRITICALITY</div>
          <div class="meter-bg">
            <div id="supernovaFill" class="meter-fill"></div>
          </div>
        </div>
      </div>
      <div id="nextPreview">
        <div class="preview-label">NEXT OBJECT</div>
        <div class="preview-box" id="previewBox">
          <canvas id="previewCanvas" width="60" height="60"></canvas>
        </div>
      </div>
      <div class="line"></div>
      <div id="gameOver">
        <div class="game-over-title">SYSTEM HALTED</div>
        <div class="final-score">
          TOTAL REVENUE: <span id="finalScoreVal">0</span>
        </div>
        <button class="menu-btn" onclick="game.reset()">REBOOT SESSION</button>
        <button
          class="menu-btn"
          style="
            margin-top: 10px;
            border-color: var(--neon-purple);
            color: var(--neon-purple);
          "
          onclick="game.toggleLeaderboard(true)"
        >
          VIEW LEADERBOARD
        </button>
        <button
          class="menu-btn"
          style="margin-top: 10px; border-color: #94a3b8; color: #94a3b8"
          onclick="window.location.href = '/'"
        >
          RETURN TO HUB
        </button>
      </div>

      <div id="powerupContainer">
        <button
          id="blackHoleBtn"
          class="powerup-btn"
          onclick="game.activateBlackHole()"
          disabled
        >
          <div style="font-size: 0.6rem; opacity: 0.7">ABILITY</div>
          SINGULARITY
          <div id="blackHoleCharge" class="charge-bar"></div>
        </button>
        <button
          id="shopBtn"
          class="powerup-btn"
          style="border-color: var(--neon-cyan); color: var(--neon-cyan)"
          onclick="game.toggleShop(true)"
        >
          <div style="font-size: 0.6rem; opacity: 0.7">RESTORE</div>
          UPGRADES
        </button>
        <button
          id="leaderboardBtn"
          class="powerup-btn"
          style="
            border-color: #94a3b8;
            color: #94a3b8;
            min-width: auto;
            padding: 12px;
          "
          onclick="game.toggleLeaderboard(true)"
        >
          🏆
        </button>
      </div>

      <!-- Modals -->
      <div id="shopModal" class="modal">
        <div class="modal-content">
          <div class="modal-title">
            UPGRADES
            <span class="close-btn" onclick="game.toggleShop(false)">×</span>
          </div>
          <div id="shopList">
            <!-- Shop items injected here -->
          </div>
        </div>
      </div>

      <div id="leaderboardModal" class="modal">
        <div class="modal-content">
          <div class="modal-title">
            LEADERBOARD
            <span class="close-btn" onclick="game.toggleLeaderboard(false)"
              >×</span
            >
          </div>
          <div id="leaderboardList" class="leaderboard-list">
            <!-- Leaderboard entries injected here -->
          </div>
        </div>
      </div>

      <div id="warningToast" class="warning-toast">DEBRIS IMPACT IMMINENT</div>
      <div id="controlsToast" class="controls-toast">
        MOVE MOUSE TO AIM • CLICK TO DROP PLANET
      </div>
      <canvas id="gameCanvas"></canvas>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
